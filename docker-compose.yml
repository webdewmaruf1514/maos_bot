version: "3.9"

services:
  bot:
    build: .
    container_name: bnpz-bot
    ports:
      - "8081:8000"
    environment:
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-2208Mysql!@#Bnpz}
      DB_NAME: ${DB_NAME:-maosh}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: bnpz-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-2208Mysql!@#Bnpz}
      MYSQL_DATABASE: ${DB_NAME:-maosh}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: bnpz-pma
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  mysql_data: